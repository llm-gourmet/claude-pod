services:
  claude:
    build: ./claude
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    # Phase 17 D-14 / Pitfall 5: explicit memory cap so the E2E scenario 4
    # resource-limit assertion has a concrete value to verify via docker inspect.
    # Short form (mem_limit) is honored by `docker compose up`; deploy.resources
    # is Swarm-only and silently ignored, so do NOT switch to that form.
    mem_limit: 1g
    env_file:
      - ${SECRETS_FILE:-/dev/null}
    environment:
      - ANTHROPIC_BASE_URL=http://proxy:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-dummy}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - DISABLE_TELEMETRY=1
      - DISABLE_AUTOUPDATER=1
      - DISABLE_ERROR_REPORTING=1
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      - LOG_HOOK=${LOG_HOOK:-0}
      - LOG_PREFIX=${LOG_PREFIX:-}
      - REPORT_REPO=${REPORT_REPO:-}
      - REPORT_BRANCH=${REPORT_BRANCH:-main}
      - REPORT_PROJECT_DIR=${REPORT_PROJECT_DIR:-}
    volumes:
      - workspace:/workspace
      - ${WHITELIST_PATH:-./config/whitelist.json}:/etc/claude-secure/whitelist.json:ro
      - ${LOG_DIR:-./logs}:/var/log/claude-secure
    networks:
      - claude-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      proxy:
        condition: service_started

  proxy:
    build: ./proxy
    env_file:
      - ${SECRETS_FILE:-/dev/null}
    environment:
      - REAL_ANTHROPIC_BASE_URL=${REAL_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - WHITELIST_PATH=/etc/claude-secure/whitelist.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - LOG_ANTHROPIC=${LOG_ANTHROPIC:-0}
      - LOG_ANTHROPIC_BODIES=${LOG_ANTHROPIC_BODIES:-0}
      - LOG_PREFIX=${LOG_PREFIX:-}
    volumes:
      - ${WHITELIST_PATH:-./config/whitelist.json}:/etc/claude-secure/whitelist.json:ro
      - ${LOG_DIR:-./logs}:/var/log/claude-secure
    networks:
      claude-internal:
        aliases:
          - api.anthropic.com
          - statsig.anthropic.com
          - sentry.anthropic.com
      claude-external:

  validator:
    build: ./validator
    network_mode: "service:claude"
    cap_add:
      - NET_ADMIN
    environment:
      - LOG_IPTABLES=${LOG_IPTABLES:-0}
      - LOG_PREFIX=${LOG_PREFIX:-}
    volumes:
      - ${WHITELIST_PATH:-./config/whitelist.json}:/etc/claude-secure/whitelist.json:ro
      - validator-db:/data
      - ${LOG_DIR:-./logs}:/var/log/claude-secure
    depends_on:
      claude:
        condition: service_started

networks:
  claude-internal:
    internal: true
  claude-external: {}

volumes:
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORKSPACE_PATH:-./workspace}
  validator-db:
