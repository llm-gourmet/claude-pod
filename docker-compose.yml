services:
  claude:
    build: ./claude
    container_name: claude-secure
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    environment:
      - ANTHROPIC_BASE_URL=http://proxy:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-dummy}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - workspace:/workspace
      - ./config/whitelist.json:/etc/claude-secure/whitelist.json:ro
    networks:
      - claude-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      proxy:
        condition: service_started

  proxy:
    build: ./proxy
    container_name: claude-proxy
    environment:
      - REAL_ANTHROPIC_BASE_URL=https://api.anthropic.com
      - WHITELIST_PATH=/etc/claude-secure/whitelist.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - STRIPE_KEY=${STRIPE_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config/whitelist.json:/etc/claude-secure/whitelist.json:ro
    networks:
      - claude-internal
      - claude-external

  validator:
    build: ./validator
    container_name: claude-validator
    network_mode: "service:claude"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config/whitelist.json:/etc/claude-secure/whitelist.json:ro
      - validator-db:/data
    depends_on:
      claude:
        condition: service_started

networks:
  claude-internal:
    internal: true
  claude-external: {}

volumes:
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORKSPACE_PATH:-./workspace}
  validator-db:
