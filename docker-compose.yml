services:
  claude:
    build: ./claude
    container_name: claude-secure
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    environment:
      - ANTHROPIC_BASE_URL=http://proxy:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-dummy}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - DISABLE_TELEMETRY=1
      - DISABLE_AUTOUPDATER=1
      - DISABLE_ERROR_REPORTING=1
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      - LOG_HOOK=${LOG_HOOK:-0}
    volumes:
      - workspace:/workspace
      - ./config/whitelist.json:/etc/claude-secure/whitelist.json:ro
      - ${LOG_DIR:-./logs}:/var/log/claude-secure
    networks:
      - claude-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      proxy:
        condition: service_started

  proxy:
    build: ./proxy
    container_name: claude-proxy
    env_file:
      - ${SECRETS_FILE:-/dev/null}
    environment:
      - REAL_ANTHROPIC_BASE_URL=https://api.anthropic.com
      - WHITELIST_PATH=/etc/claude-secure/whitelist.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - LOG_ANTHROPIC=${LOG_ANTHROPIC:-0}
    volumes:
      - ./config/whitelist.json:/etc/claude-secure/whitelist.json:ro
      - ${LOG_DIR:-./logs}:/var/log/claude-secure
    networks:
      claude-internal:
        aliases:
          - api.anthropic.com
          - statsig.anthropic.com
          - sentry.anthropic.com
      claude-external:

  validator:
    build: ./validator
    container_name: claude-validator
    network_mode: "service:claude"
    cap_add:
      - NET_ADMIN
    environment:
      - LOG_IPTABLES=${LOG_IPTABLES:-0}
    volumes:
      - ./config/whitelist.json:/etc/claude-secure/whitelist.json:ro
      - validator-db:/data
      - ${LOG_DIR:-./logs}:/var/log/claude-secure
    depends_on:
      claude:
        condition: service_started

networks:
  claude-internal:
    internal: true
  claude-external: {}

volumes:
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORKSPACE_PATH:-./workspace}
  validator-db:
