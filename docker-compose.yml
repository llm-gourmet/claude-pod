services:
  claude:
    build: ./claude
    image: claude-pod-claude
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    # Phase 17 D-14 / Pitfall 5: explicit memory cap so the E2E scenario 4
    # resource-limit assertion has a concrete value to verify via docker inspect.
    # Short form (mem_limit) is honored by `docker compose up`; deploy.resources
    # is Swarm-only and silently ignored, so do NOT switch to that form.
    mem_limit: 1g
    # Issue #72: Docker labels for instance tracking.
    # Set by claude-pod CLI before docker compose up (CLAUDE_POD_LABEL_* env vars).
    # Enables `claude-pod list` to discover running instances via:
    #   docker ps --filter "label=claude-pod.profile"
    labels:
      - "claude-pod.profile=${CLAUDE_POD_LABEL_PROFILE:-}"
      - "claude-pod.type=${CLAUDE_POD_LABEL_TYPE:-}"
      - "claude-pod.event-type=${CLAUDE_POD_LABEL_EVENT_TYPE:-}"
      - "claude-pod.event-id=${CLAUDE_POD_LABEL_EVENT_ID:-}"
      - "claude-pod.started-at=${CLAUDE_POD_LABEL_STARTED_AT:-}"
    # Auth vars (ANTHROPIC_API_KEY, CLAUDE_CODE_OAUTH_TOKEN) are delivered
    # exclusively via env_file — no environment overrides so the real key
    # is never shadowed by a dummy fallback.
    env_file:
      - ${SECRETS_FILE:-/dev/null}
    environment:
      - ANTHROPIC_BASE_URL=http://proxy:8080
      - DISABLE_TELEMETRY=1
      - DISABLE_AUTOUPDATER=1
      - DISABLE_ERROR_REPORTING=1
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      - LOG_HOOK=${LOG_HOOK:-0}
      - LOG_PREFIX=${LOG_PREFIX:-}
    volumes:
      - ${PROFILE_PATH:-./config/profile.json}:/etc/claude-pod/profile.json:ro
    networks:
      - claude-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      proxy:
        condition: service_started

  proxy:
    build: ./proxy
    image: claude-pod-proxy
    env_file:
      - ${SECRETS_FILE:-/dev/null}
    environment:
      # Two-variable design: ANTHROPIC_BASE_URL (in the claude service above) always
      # points to this proxy so all traffic is intercepted. REAL_ANTHROPIC_BASE_URL
      # is what the proxy forwards to — the actual Anthropic endpoint (or a custom
      # compatible gateway when the user configures one during install).
      # Auth vars (ANTHROPIC_API_KEY, CLAUDE_CODE_OAUTH_TOKEN, REAL_ANTHROPIC_BASE_URL)
      # are delivered via env_file only — no environment overrides so host-env absence
      # never shadows the real values with empty strings. proxy.js defaults
      # REAL_ANTHROPIC_BASE_URL to https://api.anthropic.com when not set.
      - PROFILE_PATH=/etc/claude-pod/profile.json
      - LOG_ANTHROPIC=${LOG_ANTHROPIC:-0}
      - LOG_ANTHROPIC_BODIES=${LOG_ANTHROPIC_BODIES:-0}
      - LOG_PREFIX=${LOG_PREFIX:-}
    volumes:
      - ${PROFILE_PATH:-./config/profile.json}:/etc/claude-pod/profile.json:ro
    networks:
      claude-internal:
        aliases:
          - api.anthropic.com
          - statsig.anthropic.com
          - sentry.anthropic.com
      claude-external:

  validator:
    build: ./validator
    image: claude-pod-validator
    network_mode: "service:claude"
    cap_add:
      - NET_ADMIN
    environment:
      - LOG_IPTABLES=${LOG_IPTABLES:-0}
      - LOG_PREFIX=${LOG_PREFIX:-}
    volumes:
      - ${PROFILE_PATH:-./config/profile.json}:/etc/claude-pod/profile.json:ro
      - validator-db:/data
    depends_on:
      claude:
        condition: service_started

networks:
  claude-internal:
    internal: true
  claude-external: {}

volumes:
  validator-db:
